# docker-compose.yml
#
# Local development and demo environment for the GitHub ETL pipeline.
# Starts two services:
#   - postgres: PostgreSQL 17 database (star schema + staging)
#   - dagster:  Dagster webserver + daemon (configured later)
#
# Usage:
#   cp .env.example .env         # fill in your credentials
#   docker-compose up -d postgres  # start just postgres for now
#   docker-compose up              # start all services (once Dagster image is ready)

services:

  postgres:
    image: postgres:17
    container_name: github_etl_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dagster:
    build:
      context: .
      dockerfile: docker/dagster/Dockerfile
    container_name: github_etl_dagster
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID}
      GITHUB_ENTERPRISE_URL: ${GITHUB_ENTERPRISE_URL}
      GITHUB_GRAPHQL_URL: ${GITHUB_GRAPHQL_URL}
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    profiles:
      - full  # only starts with: docker-compose --profile full up

volumes:
  postgres_data:
  dagster_home:
